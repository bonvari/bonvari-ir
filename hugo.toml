baseURL = "https://bonvari.ir/"
title = "مهدی بنواری"
defaultContentLanguage = "fa"
defaultContentLanguageInSubdir = false
enableEmoji = true
enableRobotsTXT = true

# Pretty URLs: /works/ instead of /works/index.html
[permalinks]
  books = "/book/:slug/"
  notes = "/notes/:slug/"

[taxonomies]
  book_type = "book_types"
  status = "statuses"

[markup.goldmark.renderer]
  unsafe = true

# ---------------------------------------------------------------------------
# Languages
# ---------------------------------------------------------------------------
[languages]
  [languages.fa]
    locale = "fa-IR"
    label = "فارسی"
    direction = "rtl"
    contentDir = "content/fa"
    weight = 1
    title = "مهدی بنواری"
    [languages.fa.params]
      description = "مهدی بنواری، نویسنده و مترجم؛ آثار تألیفی، ترجمه‌ها و یادداشت‌ها."

  [languages.en]
    locale = "en-US"
    label = "English"
    direction = "ltr"
    contentDir = "content/en"
    weight = 2
    title = "Mehdi Bonvari"
    [languages.en.params]
      description = "Mehdi Bonvari — author and translator; original works, translations and notes."

