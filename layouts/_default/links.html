{{ define "main" }}
<div class="container container--narrow">
    <div class="page-header"><h1 class="page-header__title">{{ .Title }}</h1></div>
</div>
<div class="container">
    {{ range .Params.link_groups }}
    <section class="section links-site">
        <div class="links-site__header">
            <h2 class="links-site__name">
                <a href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a>
            </h2>
            <p class="links-site__desc">{{ .description }}</p>
        </div>
        <ul class="media-article-list">
            {{ range .articles }}
            <li class="media-article-item">
                <a href="{{ .url }}" target="_blank" rel="noopener" class="media-article-item__title">{{ .title }}{{ with .type }} <span class="media-article-item__type">{{ . }}</span>{{ end }}</a>
                {{ with .summary }}<p class="media-article-item__summary">{{ . }}</p>{{ end }}
            </li>
            {{ end }}
        </ul>
    </section>
    {{ end }}
</div>
{{ end }}
