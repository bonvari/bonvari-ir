{{ define "main" }}
<div class="container container--narrow">
    <div class="page-header"><h1 class="page-header__title">{{ .Title }}</h1></div>
    <div class="entry-content">
        <p>{{ i18n "contact_intro" }}</p>

        <div class="contact-links" style="margin-top:2rem;display:flex;flex-direction:column;gap:1rem">
            <a href="mailto:mehdi.bonvari@gmail.com" class="btn btn--primary">{{ i18n "contact_email_label" }}: mehdi.bonvari@gmail.com</a>
            <a href="{{ .Site.Params.social.instagram }}" target="_blank" rel="noopener" class="btn btn--outline">{{ i18n "contact_instagram_label" }}</a>
            <a href="{{ .Site.Params.social.goodreads }}" target="_blank" rel="noopener" class="btn btn--outline">{{ i18n "contact_goodreads_label" }}</a>
        </div>
    </div>
</div>
{{ end }}
