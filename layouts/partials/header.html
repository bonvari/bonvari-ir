<header class="site-header">
    <div class="container">
        <a href="{{ .Site.Home.RelPermalink }}" class="site-logo">{{ .Site.Title }}</a>

        <button class="nav-toggle" aria-label="{{ i18n "toggle_menu" }}" aria-expanded="false">☰</button>

        <nav class="site-nav" role="navigation" aria-label="{{ i18n "main_menu" }}">
            <ul>
                {{ $lang := .Site.Language.Lang }}
                {{ range index .Site.Menus $lang }}
                <li><a href="{{ .URL | relLangURL }}"{{ if $.IsMenuCurrent $lang . }} class="current"{{ end }}>{{ .Name }}</a></li>
                {{ end }}
                {{ partial "lang-switcher.html" . }}
            </ul>
        </nav>
    </div>
</header>
